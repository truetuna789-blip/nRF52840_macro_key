# =========================
# 기본
# =========================
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="ZMK"

# =========================
# 🔥 핵심: Windows 안정화
# =========================
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y

# ❗ 이거 중요 (문제 원인 제거)
CONFIG_BT_SMP_APP_PAIRING_ACCEPT=n

# ❗ 패스키 끄지 마세요 (Windows 필요)
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# =========================
# 안정성
# =========================
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

# =========================
# 인코더
# =========================
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
